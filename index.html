<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rolê ITZ 🔥</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1>Rolê ITZ 🔥</h1>
      <div class="filtros">
        <button class="filtro-ativo" data-tag="todos">🔥 Bombando</button>
        <button data-tag="sertanejo">Sertanejo</button>
        <button data-tag="funk">Funk</button>
        <button data-tag="eletronica">Eletrônica</button>
        <button data-tag="forro">Forró</button>
        <button data-tag="pagode">Pagode</button>
        <button data-tag="ranking">👑 Top 5</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="feed-wrapper">
      <!-- Barra de Stories estilo Instagram -->
      <div class="stories-bar">
        <div class="stories-container" id="stories-container"></div>
      </div>
      
      <!-- Ranking Semanal -->
      <div id="ranking-semanal" class="ranking-container" style="display: none;"></div>
      
      <div id="feed"></div>
    </div>
    
    <div class="map-sidebar">
      <div class="map-controles">
        <button id="btn-heatmap" class="btn-map-ctrl">🔥 Mapa de Calor</button>
        <button id="btn-perto" class="btn-map-ctrl">📍 Perto de mim</button>
      </div>
      <div id="map"></div>
    </div>
  </div>

  <!-- Modal Imersivo Full -->
  <div id="modal" class="modal">
    <div class="modal-bg"></div>
    <div class="modal-content-full">
      <div class="modal-barra-top">
        <div class="modal-progresso"></div>
      </div>

      <button class="modal-fechar-full">&times;</button>

      <div class="modal-foto-wrapper">
        <img id="modal-img-full" src="" alt="">
        <div class="modal-gradiente"></div>

        <div class="modal-overlay-info">
          <div class="modal-tag-lotacao">
            <span class="pulse"></span>
            <span id="modal-status">🔥 BOMBA HOJE</span>
          </div>

          <div id="modal-countdown" class="modal-countdown">
            <span>COMEÇA EM</span>
            <strong id="modal-timer">02:15:33</strong>
          </div>

          <h2 id="modal-nome-full"></h2>
          <p id="modal-atracao-full"></p>

          <div class="modal-stats">
            <div class="stat">
              <strong id="modal-bombando-full">0</strong>
              <span>confirmaram</span>
            </div>
            <div class="stat">
              <strong id="modal-hora-full">22h</strong>
              <span>abre</span>
            </div>
            <div class="stat">
              <strong id="modal-preco-full">R$ 0</strong>
              <span>entrada</span>
            </div>
          </div>

          <div class="modal-aviso">
            <span>⏰</span>
            <p id="modal-urgencia">Últimas 47 vagas no 1º lote</p>
          </div>

          <div id="modal-tags-full" class="modal-tags-full"></div>

          <p id="modal-desc-full"></p>

          <div class="modal-botoes">
            <button id="modal-btn-full" class="btn-confirmar">
              <span>GARANTIR MINHA VAGA</span>
              <small>Restam <b id="modal-vagas">47</b></small>
            </button>
            <button class="btn-checkin" onclick="fazerCheckin()">
              <span>📍</span>
            </button>
            <button class="btn-compartilhar-modal" onclick="compartilharModal()">
              <span>📤</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de Stories -->
  <div id="modal-stories" class="modal-stories">
    <div class="stories-viewer">
      <div class="stories-progresso" id="stories-progresso"></div>
      <div class="stories-header">
        <div class="stories-user">
          <img id="stories-avatar" src="" alt="">
          <div>
            <strong id="stories-nome"></strong>
            <span id="stories-tempo">2h</span>
          </div>
        </div>
        <button class="stories-fechar">&times;</button>
      </div>
      <img id="stories-img" src="" alt="">
      <div class="stories-footer">
        <input type="text" placeholder="Responder..." class="stories-input">
        <button onclick="irParaRole()">📍 Ver rolê</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
